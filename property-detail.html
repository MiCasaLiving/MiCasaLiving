  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --terra: #C4623A;
      --terra-light: #D97B52;
      --terra-dark: #A8512F;
      --cream: #FAF6F0;
      --warm-white: #FFFCF8;
      --sand: #E8DDD0;
      --dark: #1C1510;
      --brown: #3D2B1F;
      --muted: #7A6458;
      --gold: #C9A96E;
      --white-trans: rgba(255, 252, 248, 0.95);
      --dark-trans: rgba(28, 21, 16, 0.9);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--warm-white);
      color: var(--dark);
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.6rem 4rem;
      background: var(--white-trans);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(196, 98, 58, 0.08);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; font-weight: 400;
      color: var(--dark); text-decoration: none;
    }
    .nav-logo span { color: var(--terra); }
    .nav-back {
      background: var(--terra); color: white;
      padding: 0.7rem 1.8rem; border-radius: 3px;
      font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase;
      text-decoration: none; font-weight: 600;
      transition: all 0.3s ease;
    }
    .nav-back:hover {
      background: var(--terra-dark);
    }

    /* ── HERO GALLERY ── */
    .detail-hero {
      margin-top: 80px;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 2px;
      height: 500px;
      margin-bottom: 4rem;
    }
    .detail-hero-main {
      overflow: hidden;
      grid-row: span 2;
    }
    .detail-hero-main img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .detail-hero-side {
      overflow: hidden;
    }
    .detail-hero-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── DETAIL BODY ── */
    .detail-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 4rem;
    }
    .detail-header {
      margin-bottom: 3rem;
    }
    .detail-tag {
      display: inline-block;
      background: var(--terra);
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 3px;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    .detail-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.2rem;
      font-weight: 300;
      color: var(--dark);
      margin-bottom: 2rem;
      line-height: 1.2;
    }
    .detail-meta {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--sand);
      margin-bottom: 3rem;
    }
    .detail-meta-item {
      text-align: center;
    }
    .detail-meta-label {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    .detail-meta-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 400;
      color: var(--dark);
    }

    /* ── DESCRIPTION ── */
    .detail-description {
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--muted);
      margin-bottom: 4rem;
    }
    .detail-description p {
      margin-bottom: 1.5rem;
    }

    /* ── GALLERY ── */
    .detail-gallery {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
      margin-bottom: 4rem;
    }
    .gallery-item {
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 4px;
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }
    .gallery-item:hover img {
      transform: scale(1.08);
    }

    /* ── AMENITIES ── */
    .detail-amenities {
      background: var(--sand);
      padding: 3rem;
      border-radius: 4px;
      margin-bottom: 4rem;
    }
    .amenities-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--dark);
      margin-bottom: 2rem;
    }
    .amenities-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.2rem;
    }
    .amenity-item {
      color: var(--dark);
      font-size: 0.95rem;
    }
    .amenity-item::before {
      content: "✓";
      color: var(--terra);
      margin-right: 0.8rem;
      font-weight: bold;
    }

    /* ── INQUIRY FORM ── */
    .detail-inquiry {
      background: var(--warm-white);
      border: 1px solid var(--sand);
      padding: 3rem;
      border-radius: 4px;
      margin-bottom: 6rem;
    }
    .inquiry-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--dark);
      margin-bottom: 2rem;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
      font-weight: 600;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.9rem 1.2rem;
      border: 1px solid var(--sand);
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--dark);
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: var(--muted);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 120px;
    }
    .form-submit {
      background: var(--terra);
      color: white;
      padding: 1.2rem 2.4rem;
      border: none;
      border-radius: 3px;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 24px rgba(196, 98, 58, 0.2);
    }
    .form-submit:hover {
      background: var(--terra-dark);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(196, 98, 58, 0.3);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav { padding: 1rem 2rem; }
      .detail-container { padding: 0 2rem; }
      .detail-hero { grid-template-columns: 1fr; height: auto; aspect-ratio: 16/9; }
      .detail-hero-main { grid-row: span 1; }
      .detail-hero-side { display: none; }
      .detail-title { font-size: 2rem; }
      .detail-meta { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
      .detail-gallery { grid-template-columns: 1fr; }
      .amenities-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }
    /* ── AMENITIES PHOTOS GALLERY ── */
    .detail-amenities-photos {
      margin-bottom: 4rem;
    }
    .amenities-photos-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--dark);
      margin-bottom: 2rem;
    }
    .amenities-photos-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
    }
    .amenity-photo {
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 4px;
      background: var(--sand);
    }
    .amenity-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }
    .amenity-photo:hover img {
      transform: scale(1.08);
    }
    
    @media (max-width: 1024px) {
      .amenities-photos-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 640px) {
      .amenities-photos-grid {
        grid-template-columns: 1fr;
      }
      .amenities-photos-title {
        font-size: 1.4rem;
      }
    }

  </style>
</head>

    if (propertyDetails[name]) {
      propertyDetails[name] = { ...propertyDetails[name], ...override };
    }
  });
  // PHOTO_OVERRIDES_END

  function loadProperty() {
    const params = new URLSearchParams(window.location.search);
    const propertyName = params.get('property');
    
    if (!propertyName || !propertyDetails[propertyName]) {
      document.body.innerHTML = '<div style="text-align: center; padding: 4rem;"><h1>Property not found</h1><a href="/">← Back to Properties</a></div>';
      return;
    }

    const data = propertyDetails[propertyName];

    // Update page
    document.title = propertyName + ' - Mi Casa Living';
    document.getElementById('detailTitle').textContent = propertyName;
    document.getElementById('detailTag').textContent = data.tag;
    document.getElementById('detailBeds').textContent = data.beds;
    document.getElementById('detailBaths').textContent = data.baths;
    document.getElementById('detailLocation').textContent = data.location;
    document.getElementById('detailPrice').textContent = data.price;

    // Format description
    const formattedDesc = data.description.split('\n\n').map(p => `<p>${p}</p>`).join('');
    document.getElementById('detailDescription').innerHTML = formattedDesc;

    // Amenities
    const amenitiesHTML = data.amenities.map(a => `<div class="amenity-item">${a}</div>`).join('');
    document.getElementById('detailAmenities').innerHTML = amenitiesHTML;

    // Set main gallery photos if available
    const heroMain = document.getElementById('heroMain');
    const heroSide = document.getElementById('heroSide');
    const galleryEl = document.querySelector('.detail-gallery');
    if (data.photos && data.photos.length) {
      if (data.photos.length >= 2) {
        heroMain.src = data.photos[0];
        heroSide.src = data.photos[1];
      }
      galleryEl.innerHTML = data.photos.map((src, i) => `
        <div class="gallery-item"><img src="${src}" alt="${propertyName} photo ${i + 1}"/></div>
      `).join('');
    }

    // Set amenity photos if available
    const amenityPhotosEl = document.getElementById('detailAmenitiesPhotos');
    if (data.amenityPhotos && data.amenityPhotos.length) {
      amenityPhotosEl.innerHTML = data.amenityPhotos.map((src, i) => `
        <div class="amenity-photo"><img src="${src}" alt="${propertyName} amenity ${i + 1}"/></div>
      `).join('');
    }

    // Form submission
    document.getElementById('inquiryForm').onsubmit = (e) => {
      e.preventDefault();
      alert(`Thank you! We'll contact you about ${propertyName} within 24 hours.`);
      document.getElementById('inquiryForm').reset();
    };
  }

  // Load on page load
  window.addEventListener('load', loadProperty);
</script>
